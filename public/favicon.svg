<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1014"/>
      <stop offset="100%" stop-color="#181b21"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="none" stroke="url(#amber)" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Code angle brackets -->
  <path d="M19 24 L12 32 L19 40" fill="none" stroke="url(#amber)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M45 24 L52 32 L45 40" fill="none" stroke="url(#amber)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center L monogram -->
  <path d="M28 18 L28 42 L40 42" fill="none" stroke="url(#amber)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
